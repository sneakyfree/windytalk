name: CI

# NOTE: GitHub Actions is billing-locked account-wide on sneakyfree (since
# ~2026-07-04), so this workflow does not execute yet. Until the lock clears the
# merge gate is a green LOCAL run of `scripts/ci.sh`, which runs the same
# commands. Keep the two in lockstep.

on:
  pull_request:
  push:
    branches: [master]

jobs:
  python:
    runs-on: [self-hosted, linux, x64]
    steps:
      - uses: actions/checkout@v4
      - name: runner-lint (hosted runners are billing-locked)
        run: bash "$GITHUB_WORKSPACE/.github/lint/lint-runner-labels.sh" "$GITHUB_WORKSPACE/.github/workflows"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install tooling
        # Engine runtime deps (faster-whisper/kokoro/CUDA) are NOT installed:
        # provider concretes import them lazily, so unit tests run GPU-free.
        # websockets + pytest-asyncio ARE needed (server tests import them).
        run: pip install ruff pytest pytest-asyncio jsonschema numpy websockets
      - name: Lint (ruff — all python modules)
        run: ruff check engine server brains agents hands auth telemetry wakeword gauntlet tests
      - name: Unit tests (pytest)
        run: python -m pytest tests/ -q

  typecheck:
    runs-on: [self-hosted, linux, x64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install desktop client deps (tsc needs @types/node)
        # apps/desktop/tsconfig.json sets types:["node"] — @types/node must be
        # installed BEFORE the typecheck, not only for the protocol tests below.
        run: |
          cd apps/desktop
          npm install --no-audit --no-fund
      - name: Typecheck TS clients
        run: |
          npx --yes -p typescript tsc --noEmit -p apps/desktop
          npx --yes -p typescript tsc --noEmit -p apps/cli
      - name: Client protocol tests
        run: |
          cd apps/desktop
          npm install --no-audit --no-fund
          npm test
