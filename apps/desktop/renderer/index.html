<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Windy Talk</title>
<style>
  :root{
    --bg1:#0d1524; --bg2:#0a0f1a; --ink:#e7f0ff; --dim:#7d8ba3; --dim2:#55617a;
    --cyan:#35d0ff; --amber:#ffb020; --green:#34e29b; --slate:#6b7a8f; --off:#5a5f66;
    --wait:#4f8fb0; --lock:#ff5a6a; --card:rgba(120,160,220,.06); --line:rgba(120,160,220,.14);
  }
  *{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;}
  html,body{background:transparent;overflow:hidden;user-select:none;height:100%;}
  #box{width:100%;height:100vh;min-height:620px;border-radius:26px;position:relative;
    background:radial-gradient(120% 70% at 50% 0%,var(--bg1),var(--bg2));
    border:1px solid var(--line);
    box-shadow:0 24px 60px rgba(0,0,0,.55), inset 0 1px 0 rgba(255,255,255,.05);
    display:flex;flex-direction:column;align-items:center;padding-bottom:12px;}
  #bar{width:100%;height:38px;-webkit-app-region:drag;display:flex;align-items:center;
    justify-content:space-between;padding:0 14px;flex-shrink:0;}
  #title{font-size:11px;letter-spacing:.16em;color:var(--dim);text-transform:uppercase;font-weight:600;}
  .barbtns{-webkit-app-region:no-drag;display:flex;gap:4px;}
  .iconbtn{cursor:pointer;color:var(--dim);font-size:14px;line-height:1;width:24px;height:24px;
    border-radius:7px;display:grid;place-items:center;transition:all .15s;}
  .iconbtn:hover{background:rgba(255,255,255,.07);color:var(--ink);}
  #stage{width:200px;height:200px;margin-top:-2px;flex-shrink:0;}
  #statusRow{display:flex;align-items:center;gap:8px;height:22px;}
  #dot{width:9px;height:9px;border-radius:50%;background:var(--off);box-shadow:0 0 10px currentColor;color:var(--off);transition:all .25s;}
  #state{font-size:13px;letter-spacing:.03em;color:var(--ink);font-weight:600;}
  #caption{height:36px;margin-top:2px;padding:0 26px;text-align:center;font-size:12px;
    line-height:1.35;color:var(--dim);overflow:hidden;transition:color .2s;display:flex;
    align-items:center;justify-content:center;}
  #btn{-webkit-app-region:no-drag;margin-top:4px;width:88px;height:88px;border-radius:50%;
    cursor:pointer;border:none;position:relative;background:transparent;outline:none;flex-shrink:0;}
  #ring{position:absolute;inset:0;border-radius:50%;border:2px solid var(--slate);transition:all .25s;}
  #core{position:absolute;inset:9px;border-radius:50%;display:grid;place-items:center;
    background:radial-gradient(90% 90% at 50% 30%,#18314a,#0e1c2c);
    box-shadow:inset 0 2px 6px rgba(0,0,0,.5);transition:all .2s;}
  #core svg{width:34px;height:34px;fill:none;stroke:var(--slate);stroke-width:2.2;
    stroke-linecap:round;stroke-linejoin:round;transition:stroke .2s;}
  #btnLabel{margin-top:6px;font-size:10px;letter-spacing:.2em;color:var(--dim);text-transform:uppercase;}
  .on #ring{border-color:var(--cyan);box-shadow:0 0 22px rgba(53,208,255,.45);}
  .on #core svg{stroke:var(--cyan);}
  /* sockets */
  #sockets{margin-top:12px;width:calc(100% - 32px);display:flex;gap:8px;flex-shrink:0;}
  .socket{flex:1;background:var(--card);border:1px solid var(--line);border-radius:12px;
    padding:9px 10px;text-align:center;}
  .socket .lbl{font-size:9px;letter-spacing:.14em;color:var(--dim2);text-transform:uppercase;}
  .socket .val{font-size:11px;color:var(--ink);margin-top:3px;font-weight:600;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .socket .sdot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--off);
    box-shadow:0 0 6px currentColor;color:var(--off);margin-right:5px;vertical-align:middle;}
  /* panel */
  #panel{margin-top:12px;width:calc(100% - 32px);flex:1;overflow-y:auto;display:none;}
  #panel.open{display:block;}
  .prow{display:flex;align-items:center;justify-content:space-between;padding:9px 2px;
    border-bottom:1px solid var(--line);font-size:12px;}
  .prow .k{color:var(--dim);}
  .prow .v{color:var(--ink);font-weight:600;max-width:190px;white-space:nowrap;overflow:hidden;
    text-overflow:ellipsis;text-align:right;}
  #footer{margin-top:auto;font-size:9px;letter-spacing:.08em;color:var(--dim2);padding-top:8px;}
</style>
</head>
<body>
<div id="box">
  <div id="bar">
    <div id="title">Windy Talk</div>
    <div class="barbtns">
      <div class="iconbtn" id="gear" title="Controls">⚙</div>
      <div class="iconbtn" id="close" title="Close">✕</div>
    </div>
  </div>
  <canvas id="stage" width="200" height="200"></canvas>
  <div id="statusRow"><div id="dot"></div><div id="state">Starting…</div></div>
  <div id="caption"></div>
  <button id="btn"><div id="ring"></div>
    <div id="core"><svg viewBox="0 0 24 24">
      <path d="M12 2a3 3 0 0 0-3 3v6a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"/>
      <path d="M5 11a7 7 0 0 0 14 0M12 18v3"/></svg></div>
  </button>
  <div id="btnLabel">Tap to talk</div>

  <div id="sockets">
    <div class="socket"><div class="lbl">Engine</div><div class="val"><span class="sdot" id="sd-engine"></span><span id="sv-engine">—</span></div></div>
    <div class="socket"><div class="lbl">Brain</div><div class="val"><span class="sdot" id="sd-brain"></span><span id="sv-brain">Mind</span></div></div>
    <div class="socket"><div class="lbl">Hands</div><div class="val"><span class="sdot" id="sd-hands"></span><span id="sv-hands">Local</span></div></div>
  </div>

  <div id="panel">
    <div class="prow"><span class="k">Microphone</span><span class="v" id="p-mic">off</span></div>
    <div class="prow"><span class="k">Session</span><span class="v" id="p-session">—</span></div>
    <div class="prow"><span class="k">Engine URL</span><span class="v" id="p-engine">—</span></div>
    <div class="prow"><span class="k">Hands URL</span><span class="v" id="p-hands">—</span></div>
    <div class="prow"><span class="k">Version</span><span class="v" id="p-ver">—</span></div>
    <div class="prow"><span class="k">Last error</span><span class="v" id="p-err">none</span></div>
  </div>
  <div id="footer">the voice of every agent</div>
</div>
<script src="face.js"></script>
<script type="module">
  const cfg = (window.windytalk && window.windytalk.cfg) || {};
  const demo = new URLSearchParams(location.search).get("demo") || cfg.demo || "";

  // ---- socket / panel wiring shared by live + demo ----
  const cssv = (n) => getComputedStyle(document.documentElement).getPropertyValue(n).trim();
  function setSocket(id, on, color) {
    const d = document.getElementById("sd-" + id);
    d.style.background = d.style.color = cssv(on ? (color || "--green") : "--off");
  }
  document.getElementById("close").onclick = () => (window.wt ? window.wt.quit() : window.close && window.close());
  const gear = document.getElementById("gear"), panel = document.getElementById("panel");
  gear.onclick = () => panel.classList.toggle("open");

  if (demo) {
    // Static render for screenshots — no engine, no mic. Mic is ON for active
    // conversational states (listening/thinking/speaking), off for paused/offline.
    window.face.setConnected(demo !== "offline");
    window.face.setMicUi(demo !== "paused" && demo !== "offline");
    window.face.setState(demo);
    setSocket("engine", demo !== "offline", "--green");
    setSocket("brain", demo !== "offline", "--cyan");
    setSocket("hands", demo !== "offline", "--amber");
    document.getElementById("sv-engine").textContent = demo === "offline" ? "offline" : "5090";
    document.getElementById("btnLabel").textContent = demo === "paused" ? "Off — tap to talk" : "On — tap to mute";
    if (demo === "speaking") { window.face.setLevel(0.7); window.face.setCaption("A windstorm is a powerful gust of wind.", "say"); }
    else if (demo === "listening") window.face.setCaption('"what is a windstorm?"', "heard");
    else if (demo === "thinking") window.face.setCaption("", "none");
    document.getElementById("p-engine").textContent = cfg.engineUrl || "ws://127.0.0.1:8788";
  } else {
    await import("../dist/src/renderer.js");
    const btn = document.getElementById("btn");
    btn.onclick = () => window.wt && window.wt.toggleMic();
    // reflect real status into the UI (§6: face driven by engine state, never invented)
    const STATE_LABEL = { idle:"Ready", listening:"Listening", thinking:"Thinking…",
      speaking:"Speaking", paused:"Paused", offline:"Offline" };
    window.wt && window.wt.onStatus((s) => {
      window.face.setMicUi(s.micOn);
      document.getElementById("btnLabel").textContent = s.micOn ? "On — tap to mute" : "Off — tap to talk";
      const online = s.connection === "online";
      setSocket("engine", online, "--green");
      setSocket("brain", online, "--cyan");
      setSocket("hands", online, "--amber");
      document.getElementById("sv-engine").textContent =
        s.connection === "connecting" ? "…" : s.connection === "terminal" ? "closed" : online ? "online" : "offline";
      // panel
      document.getElementById("p-mic").textContent = s.micError ? "no mic" : (s.micOn ? "on" : "off");
      document.getElementById("p-session").textContent = s.sessionId || "—";
      document.getElementById("p-engine").textContent = cfg.engineUrl || "ws://127.0.0.1:8788";
      document.getElementById("p-hands").textContent = cfg.handsUrl || "http://127.0.0.1:8781";
      document.getElementById("p-ver").textContent = cfg.appVersion || "0.1.0";
      document.getElementById("p-err").textContent = s.micError || s.lastError || "none";
    });
    window.windyTalkStart && window.windyTalkStart();
  }
</script>
</body>
</html>
